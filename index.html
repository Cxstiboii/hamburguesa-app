<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D0D0D" />
  <title>BurgerTurno — Haz tu pedido</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
          </svg>
        </span>
        <span class="logo-text">BurgerTurno</span>
      </div>
    </div>
  </header>

  <!-- MENU VIEW -->
  <div id="menu-view">
    <main class="page">
      <h1 class="page-title">¿Qué vas a pedir?</h1>
      <p class="page-subtitle">Elige tus items y coloca tu pedido.</p>

      <div class="menu-grid" id="menu-grid"></div>

      <div class="order-form">
        <label for="client-name">Tu nombre</label>
        <input
          type="text"
          id="client-name"
          placeholder="Ej: Juan Pérez"
          maxlength="40"
          autocomplete="off"
        />
      </div>

      <div class="payment-selector">
        <span class="ps-label">Método de pago</span>
        <div class="payment-options">
          <button type="button" class="payment-opt active" data-method="efectivo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="6" width="20" height="12" rx="2"/>
              <circle cx="12" cy="12" r="2"/>
              <path d="M6 12h.01M18 12h.01"/>
            </svg>
            Efectivo
          </button>
          <button type="button" class="payment-opt" data-method="nequi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="5"/>
              <polyline points="8,16 8,8 16,16 16,8"/>
            </svg>
            Nequi
          </button>
          <button type="button" class="payment-opt" data-method="daviplata">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="5"/>
              <path d="M9 8v8h2a4 4 0 0 0 0-8H9z"/>
            </svg>
            Daviplata
          </button>
        </div>
      </div>
    </main>

    <div class="checkout-bar">
      <div class="checkout-inner">
        <div class="checkout-total">
          <div class="label">Total</div>
          <div class="amount" id="total-display">$0</div>
        </div>
        <button class="btn-primary" id="order-btn" disabled>
          Pedir
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- CONFIRMATION VIEW -->
  <div id="confirm-view" class="hidden">
    <div class="confirm-screen">
      <div class="confirm-success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <div class="turno-block">
        <div class="turno-label">Tu número de turno</div>
        <div class="turno-num" id="confirm-turno">—</div>
      </div>
      <p class="message" id="confirm-message">Tu pedido está siendo preparado.</p>
      <div class="items-summary">
        <h3>Resumen del pedido</h3>
        <div class="summary-payment">
          <span>Método de pago</span>
          <span id="confirm-payment">Efectivo</span>
        </div>
        <ul id="confirm-items"></ul>
        <div class="total-row">
          <span>Total</span>
          <span id="confirm-total">$0</span>
        </div>
      </div>
      <button class="btn-secondary" id="new-order-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nuevo pedido
      </button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="client.js"></script>
</body>
</html>
